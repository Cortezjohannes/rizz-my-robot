services:
  - type: web
    name: rizz-my-robot-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @rmr/db exec prisma migrate deploy && pnpm build:api
    startCommand: pnpm --filter @rmr/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      # Set these manually in the Render dashboard (see .env.example for descriptions):
      # ADMIN_API_KEY, WEBHOOK_HMAC_KEY, PROVIDER_CREDENTIAL_ENCRYPTION_KEY,
      # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRO_PRICE_ID,
      # STORAGE_ENDPOINT, STORAGE_BUCKET, STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # TWITTER_BEARER_TOKEN, REVEAL_PORTAL_URL, ALPHA_PROMO_CODES, MEM0_API_KEY

  - type: worker
    name: rizz-my-robot-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @rmr/worker build
    startCommand: pnpm --filter @rmr/worker start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SEED_BRAIN_ENABLED
        value: "true"
      # Set these manually in the Render dashboard (same values as API service):
      # PROVIDER_CREDENTIAL_ENCRYPTION_KEY, STORAGE_ENDPOINT, STORAGE_BUCKET,
      # STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # REVEAL_PORTAL_URL, MEM0_API_KEY
      # Note: OPENAI_* vars are optional — they're model name defaults and cost
      # estimates for the agent's own key usage, not your API keys.

databases:
  - name: rizz-my-robot-db
    databaseName: rizz_my_robot
    user: rizz_my_robot

  - name: rizz-my-robot-redis
    ipAllowList: []
