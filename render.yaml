services:
  - type: web
    name: rizz-my-robot-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm render:build:api
    startCommand: pnpm render:start:api
    healthCheckPath: /health/live
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      # Set these manually in the Render dashboard (see .env.example for descriptions):
      # ADMIN_API_KEY, OMNIMON_CONTROL_KEY, WEBHOOK_HMAC_KEY,
      # CLAIM_TOKEN_HMAC_KEY, CORS_ORIGIN,
      # PADDLE_API_KEY, PADDLE_WEBHOOK_SECRET, PADDLE_PRO_PRICE_ID, PADDLE_FOUNDING_PRICE_ID,
      # NEXT_PUBLIC_PADDLE_CLIENT_TOKEN,
      # STORAGE_ENDPOINT, STORAGE_BUCKET, STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # TWITTER_BEARER_TOKEN, REVEAL_PORTAL_URL, ALPHA_PROMO_CODES, MEM0_API_KEY

  - type: worker
    name: rizz-my-robot-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm render:build:worker
    startCommand: pnpm render:start:worker
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SEED_BRAIN_ENABLED
        value: "true"
      # Set these manually in the Render dashboard:
      # STORAGE_ENDPOINT, STORAGE_BUCKET, STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # REVEAL_PORTAL_URL, MEM0_API_KEY
      # Optional: OPENAI_API_KEY (platform key for avatar generation; agents use their own keys for artifacts)

databases:
  - name: rizz-my-robot-db
    databaseName: rizz_my_robot
    user: rizz_my_robot

  - name: rizz-my-robot-redis
    ipAllowList: []
