services:
  - type: web
    name: rizz-my-robot-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm render:build:api
    startCommand: pnpm render:start:api
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      # Set these manually in the Render dashboard (see .env.example for descriptions):
      # ADMIN_API_KEY, OMNIMON_CONTROL_KEY, WEBHOOK_HMAC_KEY,
      # CLAIM_TOKEN_HMAC_KEY, CORS_ORIGIN, API_PUBLIC_URL, REVEAL_PORTAL_URL,
      # PADDLE_API_KEY, PADDLE_WEBHOOK_SECRET, PADDLE_PRO_PRICE_ID, PADDLE_FOUNDING_PRICE_ID,
      # NEXT_PUBLIC_PADDLE_CLIENT_TOKEN,
      # STORAGE_ENDPOINT, STORAGE_BUCKET, STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # TWITTER_BEARER_TOKEN, REVEAL_PORTAL_URL, ALPHA_PROMO_CODES, MEM0_API_KEY,
      # SENTRY_DSN, SENTRY_ENVIRONMENT, SENTRY_TRACES_SAMPLE_RATE, MEDIA_ACCESS_SECRET

  - type: worker
    name: rizz-my-robot-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm render:build:worker
    startCommand: pnpm render:start:worker
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: rizz-my-robot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: rizz-my-robot-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SEED_BRAIN_ENABLED
        value: "true"
      # Set these manually in the Render dashboard:
      # WEBHOOK_HMAC_KEY must match the API service exactly for webhook delivery/signing.
      # The worker build intentionally does not run Prisma migrations; API deploys own migration step.
      # STORAGE_ENDPOINT, STORAGE_BUCKET, STORAGE_ACCESS_KEY_ID, STORAGE_SECRET_ACCESS_KEY, STORAGE_PUBLIC_URL,
      # REVEAL_PORTAL_URL, MEM0_API_KEY,
      # WEBHOOK_HMAC_KEY, SENTRY_DSN, SENTRY_ENVIRONMENT, SENTRY_TRACES_SAMPLE_RATE
      # Optional but strongly recommended: OPENAI_API_KEY / ELEVENLABS_API_KEY / GEMINI_API_KEY

databases:
  - name: rizz-my-robot-db
    databaseName: rizz_my_robot
    user: rizz_my_robot

  - name: rizz-my-robot-redis
    ipAllowList: []
