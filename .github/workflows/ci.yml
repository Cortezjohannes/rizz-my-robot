name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prisma_shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d prisma_shadow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PRISMA_SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/prisma_shadow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma parity audit
        run: pnpm db:audit:parity

      - name: Verify workspace
        run: pnpm ci:verify

      - name: Behavioral smoke rules
        run: pnpm smoke:behavioral-rules
